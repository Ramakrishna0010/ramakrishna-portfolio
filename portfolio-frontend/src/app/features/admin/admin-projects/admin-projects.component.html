<div class="admin-page">
  <div class="page-header-row">
    <div><h2>Projects</h2><p>Manage portfolio projects</p></div>
    <button class="btn-primary" (click)="openCreate()">+ Add Project</button>
  </div>
  @if (showForm()) {
    <div class="form-panel glass-card">
      <h3>{{ editingId() ? 'Edit' : 'Add' }} Project</h3>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-row-2">
          <div class="form-group"><label>Title *</label><input type="text" formControlName="title" /></div>
          <div class="form-group"><label>Category</label><input type="text" formControlName="category" /></div>
        </div>
        <div class="form-group"><label>Short Description *</label><input type="text" formControlName="shortDescription" /></div>
        <div class="form-group"><label>Full Description</label><textarea formControlName="description" rows="4"></textarea></div>
        <div class="form-row-2">
          <div class="form-group"><label>Technology Stack (comma separated)</label><input type="text" formControlName="technologyStack" /></div>
          <div class="form-group"><label>Architecture</label><input type="text" formControlName="architecture" /></div>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label>GitHub URL</label><input type="url" formControlName="gitHubUrl" /></div>
          <div class="form-group"><label>Live Demo URL</label><input type="url" formControlName="liveDemoUrl" /></div>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label>Thumbnail URL</label><input type="url" formControlName="thumbnailUrl" /></div>
          <div class="form-group"><label>Video Demo URL</label><input type="url" formControlName="videoDemoUrl" /></div>
        </div>
        <div class="form-group"><label>Features (one per line)</label><textarea formControlName="features" rows="3"></textarea></div>
        <div class="form-group"><label>Responsibilities (one per line)</label><textarea formControlName="responsibilities" rows="3"></textarea></div>
        <div class="form-row-3">
          <div class="form-group"><label>Start Date *</label><input type="date" formControlName="startDate" /></div>
          <div class="form-group"><label>End Date</label><input type="date" formControlName="endDate" /></div>
          <div class="form-group"><label>Duration</label><input type="text" formControlName="duration" placeholder="3 months" /></div>
        </div>
        <div class="form-row-3">
          <div class="form-group"><label>Status</label>
            <select formControlName="status">
              @for (s of statuses; track s.value) { <option [value]="s.value">{{ s.label }}</option> }
            </select>
          </div>
          <div class="form-group"><label>Display Order</label><input type="number" formControlName="displayOrder" /></div>
          <div class="form-group checkbox-group"><label><input type="checkbox" formControlName="isFeatured" /> Featured</label></div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" [disabled]="loading()">{{ loading() ? 'Saving...' : 'Save' }}</button>
          <button type="button" class="btn-ghost" (click)="showForm.set(false)">Cancel</button>
        </div>
      </form>
    </div>
  }
  <div class="table-wrapper glass-card">
    <table class="admin-table">
      <thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Featured</th><th>Actions</th></tr></thead>
      <tbody>
        @for (p of projects(); track p.id) {
          <tr>
            <td>{{ p.title }}</td>
            <td>{{ p.category }}</td>
            <td><span class="badge" [class.badge-success]="p.status===2" [class.badge-warning]="p.status===1">{{ p.statusName }}</span></td>
            <td>{{ p.isFeatured ? '⭐' : '—' }}</td>
            <td><div class="action-btns">
              <button class="btn-ghost" (click)="openEdit(p)">✏️ Edit</button>
              <button class="btn-ghost danger" (click)="delete(p.id)">🗑️ Delete</button>
            </div></td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
