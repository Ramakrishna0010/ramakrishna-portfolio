name: Portfolio CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Build & Test ──────────────────────────────────────────────────
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/PortfolioApp.API

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ../../PortfolioApp.sln

      - name: Build
        run: dotnet build ../../PortfolioApp.sln --no-restore --configuration Release

      - name: Publish
        run: dotnet publish PortfolioApp.API.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: src/PortfolioApp.API/publish

  # ─── Frontend Build ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular 18)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portfolio-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build:prod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: portfolio-frontend/dist/portfolio-frontend

  # ─── Deploy to Azure (main branch only) ───────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Azure
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_API }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: ./publish

  deploy-frontend:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          path: ./dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: portfolio-frontend
          output_location: dist/portfolio-frontend
